<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Smetti">
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxODAgMTgwIj48cmVjdCB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgcng9IjQwIiBmaWxsPSIjMWExYTJlIi8+PHRleHQgeD0iOTAiIHk9IjEwNSIgZm9udC1zaXplPSI4MCIgdGV4dC1hbmNob3I9Im1pZGRsZSI+8J+agDwvdGV4dD48L3N2Zz4=">
<title>Smetti</title>
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Outfit:wght@200;400;700;900&display=swap');

  :root {
    --bg: #0f0f17;
    --surface: #1a1a2e;
    --surface-light: #25254a;
    --accent: #e94560;
    --accent-glow: rgba(233, 69, 96, 0.3);
    --green: #2ecc71;
    --green-glow: rgba(46, 204, 113, 0.25);
    --text: #eef0f6;
    --text-dim: #6b7094;
    --gold: #f0c040;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
    position: relative;
  }

  /* Ambient background */
  .ambient {
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 20%, rgba(233,69,96,0.06) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(46,204,113,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    width: 100%;
    max-width: 380px;
  }

  /* Header */
  .header {
    text-align: center;
  }

  .header h1 {
    font-family: 'Outfit', sans-serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--text) 0%, var(--text-dim) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
    font-weight: 300;
  }

  .week-badge {
    display: inline-block;
    background: var(--surface);
    border: 1px solid var(--surface-light);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    color: var(--gold);
    font-weight: 500;
    margin-top: 10px;
    letter-spacing: 0.3px;
  }

  /* Main circle counter */
  .counter-ring {
    position: relative;
    width: 220px;
    height: 220px;
  }

  .counter-ring svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .ring-bg {
    fill: none;
    stroke: var(--surface-light);
    stroke-width: 6;
  }

  .ring-progress {
    fill: none;
    stroke: var(--green);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.4s;
    filter: drop-shadow(0 0 8px var(--green-glow));
  }

  .ring-progress.warning {
    stroke: var(--gold);
    filter: drop-shadow(0 0 8px rgba(240,192,64,0.3));
  }

  .ring-progress.danger {
    stroke: var(--accent);
    filter: drop-shadow(0 0 8px var(--accent-glow));
  }

  .counter-inner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }

  .remaining-number {
    font-family: 'Outfit', sans-serif;
    font-weight: 200;
    font-size: 80px;
    line-height: 1;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .remaining-number.pop {
    animation: pop 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes pop {
    0% { transform: scale(1); }
    40% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  .remaining-label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 2px;
  }

  /* Cigarette dots */
  .cig-dots {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    min-height: 28px;
  }

  .cig-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--surface-light);
    border: 2px solid var(--text-dim);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    opacity: 0.4;
  }

  .cig-dot.smoked {
    background: var(--accent);
    border-color: var(--accent);
    opacity: 1;
    box-shadow: 0 0 10px var(--accent-glow);
  }

  .cig-dot.available {
    background: var(--green);
    border-color: var(--green);
    opacity: 0.6;
  }

  /* Smoke button */
  .smoke-btn {
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface-light) 100%);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.06);
  }

  .smoke-btn:active {
    transform: scale(0.97);
  }

  .smoke-btn.disabled {
    opacity: 0.35;
    pointer-events: none;
  }

  .smoke-btn .btn-icon {
    margin-right: 8px;
  }

  /* Undo */
  .undo-btn {
    background: none;
    border: 1px solid var(--surface-light);
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 10px 24px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.25s;
    display: none;
  }

  .undo-btn.visible {
    display: block;
  }

  .undo-btn:active {
    background: var(--surface);
  }

  /* Stats footer */
  .stats {
    display: flex;
    gap: 2px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.04);
  }

  .stat {
    flex: 1;
    padding: 14px 8px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 20px;
  }

  .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-top: 2px;
  }

  /* Zero state */
  .zero-msg {
    font-size: 13px;
    color: var(--accent);
    font-style: italic;
    font-weight: 300;
    text-align: center;
    display: none;
    min-height: 20px;
  }

  .zero-msg.visible {
    display: block;
    animation: fadeIn 0.5s;
  }

  /* Reset notification */
  .reset-toast {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: var(--surface);
    border: 1px solid var(--green);
    border-radius: 14px;
    padding: 12px 24px;
    font-size: 13px;
    color: var(--green);
    z-index: 100;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    white-space: nowrap;
  }

  .reset-toast.show {
    transform: translateX(-50%) translateY(0);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Confetti placeholder */
  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 99;
  }
</style>
</head>
<body>

<div class="ambient"></div>
<div class="confetti-container" id="confetti"></div>
<div class="reset-toast" id="toast"></div>

<div class="container">
  <div class="header">
    <h1>🚭 Smetti</h1>
    <div class="subtitle">Un giorno alla volta</div>
    <div class="week-badge" id="weekBadge"></div>
  </div>

  <div class="counter-ring" id="ring">
    <svg viewBox="0 0 220 220">
      <circle class="ring-bg" cx="110" cy="110" r="95"></circle>
      <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="95"></circle>
    </svg>
    <div class="counter-inner">
      <div class="remaining-number" id="remainNum">6</div>
      <div class="remaining-label">rimaste</div>
    </div>
  </div>

  <div class="cig-dots" id="dots"></div>

  <div class="zero-msg" id="zeroMsg">Hai finito per oggi. Tieni duro! 💪</div>

  <button class="smoke-btn" id="smokeBtn" onclick="smoke()">
    <span class="btn-icon">🚬</span> Ho fumato una sigaretta
  </button>

  <button class="undo-btn" id="undoBtn" onclick="undo()">↩ Annulla ultima</button>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="statLimit">6</div>
      <div class="stat-label">Limite</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="statSmoked">0</div>
      <div class="stat-label">Fumate</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="statDays">0</div>
      <div class="stat-label">Giorni</div>
    </div>
  </div>
</div>

<script>
  // ── State ──
  const STORAGE_KEY = 'smetti_data';
  const CIRCUMFERENCE = 2 * Math.PI * 95;
  const INITIAL_LIMIT = 6;
  const REDUCTION_WEEKS = 2; // ogni 2 settimane scende di 1
  const MIN_LIMIT = 1;

  function getDefaultState() {
    return {
      startDate: new Date().toISOString().split('T')[0],
      today: new Date().toISOString().split('T')[0],
      smoked: 0
    };
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return getDefaultState();
      return JSON.parse(raw);
    } catch { return getDefaultState(); }
  }

  function saveState(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  // ── Computed ──
  function getToday() {
    return new Date().toISOString().split('T')[0];
  }

  function daysBetween(a, b) {
    const msA = new Date(a).getTime();
    const msB = new Date(b).getTime();
    return Math.floor((msB - msA) / 86400000);
  }

  function getCurrentLimit(startDate) {
    const days = Math.max(0, daysBetween(startDate, getToday()));
    const weeks = Math.floor(days / 7);
    const reductions = Math.floor(weeks / REDUCTION_WEEKS);
    return Math.max(MIN_LIMIT, INITIAL_LIMIT - reductions);
  }

  function getWeekNumber(startDate) {
    const days = Math.max(0, daysBetween(startDate, getToday()));
    return Math.floor(days / 7) + 1;
  }

  function getTotalDays(startDate) {
    return Math.max(0, daysBetween(startDate, getToday()));
  }

  // ── Render ──
  function render() {
    let state = loadState();

    // Auto-reset at midnight
    const today = getToday();
    if (state.today !== today) {
      state.today = today;
      state.smoked = 0;
      saveState(state);
    }

    const limit = getCurrentLimit(state.startDate);
    const remaining = Math.max(0, limit - state.smoked);
    const fraction = limit > 0 ? remaining / limit : 0;

    // Ring
    const progress = document.getElementById('ringProgress');
    const offset = CIRCUMFERENCE * (1 - fraction);
    progress.style.strokeDasharray = CIRCUMFERENCE;
    progress.style.strokeDashoffset = offset;

    progress.classList.remove('warning', 'danger');
    if (fraction <= 0) progress.classList.add('danger');
    else if (fraction <= 0.34) progress.classList.add('warning');

    // Number
    const numEl = document.getElementById('remainNum');
    numEl.textContent = remaining;
    numEl.classList.remove('pop');
    void numEl.offsetWidth;
    numEl.classList.add('pop');

    // Dots
    const dotsEl = document.getElementById('dots');
    dotsEl.innerHTML = '';
    for (let i = 0; i < limit; i++) {
      const dot = document.createElement('div');
      dot.className = 'cig-dot';
      if (i < state.smoked) dot.classList.add('smoked');
      else dot.classList.add('available');
      dotsEl.appendChild(dot);
    }

    // Button
    const btn = document.getElementById('smokeBtn');
    if (remaining <= 0) {
      btn.classList.add('disabled');
    } else {
      btn.classList.remove('disabled');
    }

    // Zero message
    const zeroMsg = document.getElementById('zeroMsg');
    if (remaining <= 0) zeroMsg.classList.add('visible');
    else zeroMsg.classList.remove('visible');

    // Undo
    const undoBtn = document.getElementById('undoBtn');
    if (state.smoked > 0) undoBtn.classList.add('visible');
    else undoBtn.classList.remove('visible');

    // Stats
    document.getElementById('statLimit').textContent = limit;
    document.getElementById('statSmoked').textContent = state.smoked;
    document.getElementById('statDays').textContent = getTotalDays(state.startDate);

    // Week badge
    const week = getWeekNumber(state.startDate);
    const badge = document.getElementById('weekBadge');
    badge.textContent = `⭐ Settimana ${week} · Limite: ${limit}/giorno`;
  }

  // ── Actions ──
  function smoke() {
    const state = loadState();
    const limit = getCurrentLimit(state.startDate);
    if (state.smoked >= limit) return;

    state.smoked++;
    saveState(state);
    render();

    // Haptic feedback
    if (navigator.vibrate) navigator.vibrate(30);
  }

  function undo() {
    const state = loadState();
    if (state.smoked <= 0) return;
    state.smoked--;
    saveState(state);
    render();
  }

  // ── Midnight check ──
  function scheduleMidnightCheck() {
    const now = new Date();
    const midnight = new Date(now);
    midnight.setHours(24, 0, 0, 0);
    const ms = midnight - now;

    setTimeout(() => {
      const toast = document.getElementById('toast');
      toast.textContent = '🌙 Nuovo giorno, contatore azzerato!';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
      render();
      scheduleMidnightCheck();
    }, ms);
  }

  // ── Init ──
  const state = loadState();
  if (!state.startDate) {
    const s = getDefaultState();
    saveState(s);
  }

  render();
  scheduleMidnightCheck();

  // Re-render when tab becomes visible (coming back to app)
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) render();
  });
</script>
</body>
</html>
